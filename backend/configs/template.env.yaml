# Example for Cloud Run / Secret Manager style env wiring.
# Keys mirror backend/.env.example; values are placeholders.

MONGO_URL: "mongodb+srv://<user>:<pass>@your-cluster.mongodb.net/?retryWrites=true&w=majority"
MONGO_DB_NAME: "matching_service"

# SUPPLY_JSONL_PATH: ""
# DEMAND_JSONL_PATH: ""

SCORING_MODE: "multiplicative"
ADDITIVE_W1_SKILLS: "0.40"
ADDITIVE_W2_PREFERENCE: "0.40"
ADDITIVE_W3_MARKET: "0.20"

MATCH_TOP_K_OPPORTUNITIES: "5"
MATCH_TOP_K_OCCUPATIONS: "5"
MATCH_TOP_K_SKILL_GAPS: "5"

GATE_SIMILARITY_THRESHOLD: "0.35"
PHAT_ALPHA_ESSENTIAL: "0.5"
PHAT_BETA_READINESS: "0.2"
PHAT_GAMMA_MARKET: "0.3"

SKILL_U_W_LOC: "0.20"
SKILL_U_W_ESS: "0.50"
SKILL_U_W_OPT: "0.20"
SKILL_U_W_GRP: "0.10"
SKILL_U_GAP_PENALTY: "0.50"
SKILL_U_TAU_ELIG: "0.35"
SKILL_MIN_ESSENTIAL_MATCH_SHARE: "1.0"
SKILL_ESSENTIAL_GEO_FLOOR: "0.000001"
SKILL_ESSENTIAL_DAMPING_ALPHA: "0.0"

# Per-rowmax rescaling target. Each rowmax is divided by this and clipped at 1.0 before
# the score-weighted GM, so identity (=1.0) and strong non-identity both saturate. Default
# is read from the whitened embedding artefact's metadata (target_max_p999); set here to
# override. Leave commented to use the artefact's value.
# SKILL_RESCALE_TARGET: "0.3"

PREFERENCE_BASE_CONSTANT: "0.5"
PREFERENCE_LEGACY_SCORE_SCALE: "0.2"
PREFERENCE_SIGMOID_NUMERATOR: "4.0"

PREF_ENABLE_EARNINGS: "true"
PREF_ENABLE_TASK_CONTENT: "false"
PREF_ENABLE_PHYSICAL_DEMAND: "true"
PREF_ENABLE_WORK_FLEXIBILITY: "false"
PREF_ENABLE_SOCIAL: "true"
PREF_ENABLE_CAREER_GROWTH: "true"
PREF_ENABLE_SOCIAL_MEANING: "false"

# Optional overrides; defaults: backend/resources/occupations, skill_taxonomy, models
# OCCUPATION_JSON_PATH: ""
# Default: gemini-embedding-001 semantic embedding (3072-dim fp16, semantic
# concept similarity over preferredLabel + description):
# EMBEDDING_MODEL_PATH: "resources/models/skill_embedding_model_gemini.pt"
# Alternative: legacy Node2Vec graph-walk embedding (64-dim, ESCO-graph adjacency).
# Row order is shared with the Gemini artefact, so SKILL_TO_ROW_PATH is unchanged.
# Threshold note: GATE_SIMILARITY_THRESHOLD, SKILL_U_TAU_ELIG, and
# SKILL_ESSENTIAL_DAMPING_ALPHA were tuned against Node2Vec; recalibrate against
# Gemini's sharper score distribution before claiming production-tuned settings.
# EMBEDDING_MODEL_PATH: "resources/models/skill_embedding_model.pt"
# SKILL_TO_ROW_PATH: ""
# SKILLS_CSV_PATH: ""
# SKILL_GROUPS_CSV_PATH: ""
# SKILL_HIERARCHY_CSV_PATH: ""
